<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style_mascotas.css" />
    <title>Mis mascotas</title>
  </head>
  <body>
    <header>
      <h1>Mis mascotas</h1>
    </header>
    <main>
      <section>
        <article class="contenedor-card">
          <figure>
            <img src="/images/rocky.jpg" alt="Foto de rocky" />
          </figure>
          <h2>Rocky</h2>
          <p>
            Un perro muy jugueton que le gusta correr por el parque y
            relacionarse con otros perros.
          </p>
        </article>
        <article class="contenedor-card">
          <figure>
            <img src="/images/manolo.jpg" alt="Foto de manolo" />
          </figure>
          <h2>Manolo</h2>
          <p>
            Un perro muy protector que le encanta estar en la casa y cariñoso a
            la vez.
          </p>
        </article>
        <article class="contenedor-card">
          <figure>
            <img src="/images/natsu.jpg" alt="Foto de natsu" />
          </figure>
          <h2>Natsu</h2>
          <p>
            Un gato muy curioso que le encanta juguetear al rededor de la casa y
            ser independiente.
          </p>
        </article>
      </section>
    </main>
  </body>
</html>
